<div class="container mt-4">
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let product of products">
      <div class="card h-100">
        <img [src]="product.image" class="card-img-top p-3" height="200">
        <div class="card-body">
          <h5>{{ product.title }}</h5>
          <p>R$ {{ product.price }}</p>
          <a [routerLink]="['/product', product.id]" class="btn btn-primary">
            Ver detalhes
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
